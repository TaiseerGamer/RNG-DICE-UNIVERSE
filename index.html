<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>RNG Dice Universe V3 - Stable</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="confetti"></canvas>
<div class="app">
  <header class="topbar glass">
    <div class="stat"><span>Coins</span><b id="coins">0</b></div>
    <div class="stat"><span>Rolls</span><b id="rolls">0</b></div>
    <div class="stat"><span>Best</span><b id="best">—</b></div>
    <div class="title">RNG DICE UNIVERSE V3 • STABLE</div>
  </header>

  <main>
    <aside class="panel left glass">
      <h3>Collection</h3>
      <div id="collection"></div>
    </aside>

    <section class="center">
      <div class="dice-container glass">
        <div class="dice-wrap" id="diceBtn" aria-label="Roll Dice" role="button" tabindex="0">
          <div class="glow"></div>
          <div class="cube" id="cube">
            <div class="face front">1</div>
            <div class="face back">6</div>
            <div class="face right">3</div>
            <div class="face left">4</div>
            <div class="face top">2</div>
            <div class="face bottom">5</div>
          </div>
        </div>
        <div id="lastResult" class="result">
          <div class="res-rarity" style="color:#9ecbff;text-shadow:0 0 12px #4aa8ff">READY</div>
          <div class="res-name">Click the dice to roll</div>
          <div class="res-coins">Unlimited rolls • 100% offline</div>
        </div>
        <div id="debug" class="debug">Ready</div>
        <div class="controls">
          <button id="rollBtn" class="btn primary">ROLL</button>
          <button id="roll10Btn" class="btn">ROLL x10</button>
          <button id="autoBtn" class="btn">AUTO: OFF</button>
        </div>
      </div>
    </section>

    <aside class="panel right glass">
      <h3>Upgrades</h3>
      <div id="upgrades"></div>
    </aside>
  </main>

  <footer class="history glass">
    <div id="history"></div>
  </footer>
</div>

<script src="script.js"></script>
</body>
</html>
