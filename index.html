<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RNG Dice v0.0.2c</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="stat"><b>COINS</b><span id="coins">0</span></div>
  <div class="stat"><b>ROLLS</b><span id="rolls">0</span></div>
  <div class="stat"><b>BEST</b><span id="best">-</span></div>
  <div class="stat"><b>PRESTIGE</b><span id="prestige">0</span></div>
</header>
<main>
  <section class="center">
    <div class="dice" id="dice">🎲</div>
    <button id="rollBtn">ROLL (Space)</button>
    <div id="result">Click dice!</div>
    <div class="panel" style="width:100%">
      <div style="display:flex;justify-content:space-between"><b>Collection</b><button id="prestigeBtn" disabled>Prestige 1M</button></div>
      <div id="collection"></div>
    </div>
  </section>
  <aside class="panel">
    <h3>Upgrades <span id="mult" style="float:right;opacity:.7">x1</span></h3>
    <div class="shop" id="shop"></div>
    <h3>History</h3>
    <div class="history" id="history"></div>
  </aside>
</main>
<script src="script.js"></script>
</body>
</html>
